name: Update SprintOS page

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate index.html from SprintOS sitemap
        run: node scripts/update-sprintos-page.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet index.html; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update SprintOS links from sitemap"
          git push
